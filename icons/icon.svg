<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background radial warmth -->
    <radialGradient id="bg" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#2A1810"/>
      <stop offset="100%" stop-color="#1C1008"/>
    </radialGradient>

    <!-- Amber beer gradient -->
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8A050"/>
      <stop offset="55%" stop-color="#E07020"/>
      <stop offset="100%" stop-color="#A85010"/>
    </linearGradient>

    <!-- Glass highlight -->
    <linearGradient id="glassHL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Foam -->
    <linearGradient id="foam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF5"/>
      <stop offset="100%" stop-color="#EDE0C6"/>
    </linearGradient>

    <!-- Gold ring -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4C840"/>
      <stop offset="50%" stop-color="#D4A020"/>
      <stop offset="100%" stop-color="#F4C840"/>
    </linearGradient>

    <!-- Hop leaf -->
    <linearGradient id="hop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8BAA50"/>
      <stop offset="100%" stop-color="#5C7A30"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#ring)" stroke-width="0.5" opacity="0.12"/>

  <!-- ─── Tulip glass ─── -->
  <!-- Stem + base -->
  <rect x="244" y="368" width="24" height="52" rx="4" fill="#D4A020" opacity="0.85"/>
  <ellipse cx="256" cy="420" rx="52" ry="10" fill="#D4A020" opacity="0.8"/>
  <ellipse cx="256" cy="418" rx="48" ry="7" fill="#E8B830" opacity="0.35"/>

  <!-- Bowl (tulip shape) -->
  <path d="M176 240 C176 190 200 142 256 130 C312 142 336 190 336 240
           L330 310 C326 340 300 358 256 368 C212 358 186 340 182 310 Z"
        fill="url(#beer)"/>

  <!-- Glass edge highlight (left) -->
  <path d="M182 240 C182 196 204 152 256 140 C216 152 196 196 196 240
           L192 308 C190 330 206 350 256 362 C220 354 198 336 196 310 Z"
        fill="url(#glassHL)"/>

  <!-- Beer liquid top line -->
  <path d="M184 230 C184 230 210 226 256 226 C302 226 328 230 328 230"
        fill="none" stroke="#F4C840" stroke-width="1" opacity="0.35"/>

  <!-- Bubbles rising -->
  <circle cx="230" cy="300" r="3.5" fill="white" opacity="0.12"/>
  <circle cx="245" cy="270" r="2.5" fill="white" opacity="0.10"/>
  <circle cx="268" cy="310" r="4" fill="white" opacity="0.09"/>
  <circle cx="280" cy="260" r="3" fill="white" opacity="0.11"/>
  <circle cx="240" cy="340" r="2" fill="white" opacity="0.08"/>
  <circle cx="275" cy="285" r="2.5" fill="white" opacity="0.10"/>

  <!-- ─── Foam crown ─── -->
  <ellipse cx="210" cy="160" rx="30" ry="24" fill="url(#foam)"/>
  <ellipse cx="248" cy="148" rx="36" ry="28" fill="url(#foam)"/>
  <ellipse cx="290" cy="152" rx="32" ry="26" fill="url(#foam)"/>
  <ellipse cx="320" cy="164" rx="22" ry="18" fill="url(#foam)"/>
  <ellipse cx="185" cy="168" rx="18" ry="15" fill="url(#foam)"/>
  <!-- Fill gap between bowl top and foam lobes -->
  <path d="M184 178 C184 178 200 140 256 132 C312 140 328 178 328 178
           L328 190 C320 170 290 162 256 158 C222 162 192 170 184 190 Z"
        fill="url(#foam)"/>
  <!-- Foam shine -->
  <ellipse cx="234" cy="150" rx="14" ry="6" fill="white" opacity="0.45"/>
  <ellipse cx="280" cy="154" rx="10" ry="5" fill="white" opacity="0.30"/>

  <!-- ─── Hop cone accent (right side) ─── -->
  <g transform="translate(348, 260) rotate(-20)">
    <!-- Hop leaves -->
    <ellipse cx="0" cy="-12" rx="10" ry="16" fill="url(#hop)" opacity="0.9"/>
    <ellipse cx="10" cy="-4" rx="10" ry="14" fill="url(#hop)" opacity="0.8" transform="rotate(35 10 -4)"/>
    <ellipse cx="-10" cy="-2" rx="9" ry="14" fill="url(#hop)" opacity="0.8" transform="rotate(-30 -10 -2)"/>
    <ellipse cx="4" cy="10" rx="9" ry="13" fill="url(#hop)" opacity="0.7" transform="rotate(20 4 10)"/>
    <ellipse cx="-6" cy="12" rx="8" ry="12" fill="url(#hop)" opacity="0.7" transform="rotate(-25 -6 12)"/>
    <!-- Hop center dots -->
    <circle cx="0" cy="-6" r="2" fill="#A8C060" opacity="0.6"/>
    <circle cx="4" cy="6" r="1.5" fill="#A8C060" opacity="0.5"/>
    <!-- Stem -->
    <line x1="0" y1="22" x2="6" y2="44" stroke="#5C7A30" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <ellipse cx="10" cy="40" rx="6" ry="4" fill="url(#hop)" opacity="0.5" transform="rotate(15 10 40)"/>
  </g>

  <!-- ─── Wheat sprig accent (left side) ─── -->
  <g transform="translate(148, 270) rotate(15)">
    <line x1="0" y1="0" x2="-10" y2="50" stroke="#D4A020" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- Wheat grains -->
    <ellipse cx="-4" cy="6" rx="4" ry="8" fill="#D4A020" opacity="0.7" transform="rotate(-25 -4 6)"/>
    <ellipse cx="-6" cy="18" rx="4" ry="8" fill="#D4A020" opacity="0.65" transform="rotate(-20 -6 18)"/>
    <ellipse cx="2" cy="12" rx="4" ry="7" fill="#D4A020" opacity="0.6" transform="rotate(20 2 12)"/>
    <ellipse cx="-8" cy="30" rx="3.5" ry="7" fill="#D4A020" opacity="0.55" transform="rotate(-15 -8 30)"/>
    <ellipse cx="0" cy="26" rx="3.5" ry="7" fill="#D4A020" opacity="0.5" transform="rotate(18 0 26)"/>
    <!-- Awn wisps -->
    <line x1="-4" y1="0" x2="-14" y2="-10" stroke="#D4A020" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="2" y1="6" x2="10" y2="-2" stroke="#D4A020" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- ─── Warm ambient glow ─── -->
  <circle cx="256" cy="280" r="120" fill="#F07828" opacity="0.04"/>
</svg>
